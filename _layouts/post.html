---
layout: default
---
<article class="max-w-[800px] mx-auto px-6 py-16">
    <header class="border-b border-gray-3 pb-6 mb-10">
        <a href="{{ '/blog.html' | relative_url }}" class="text-lime hover:text-white text-[14px] font-bold tracking-wide transition-colors duration-200 no-underline mb-4 inline-block font-mono">← BACK TO BLOG</a>
        <h1 class="text-[clamp(2rem,5vw,3rem)] font-bold tracking-tighter leading-[1.1] mb-4">{{ page.title }}</h1>
        <div class="text-gray-5 text-[14px] font-mono">
            <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %d, %Y" }}</time>
            {% if page.author %}
                • <span class="text-gray-4">By {{ page.author }}</span>
            {% endif %}
        </div>
    </header>

    <div class="post-content [&>p]:text-gray-5 [&>p]:text-[15.5px] [&>p]:leading-[1.76] [&>p]:mb-6 [&>p_strong]:text-white [&>p_strong]:font-medium [&>p_a]:text-lime [&>p_a]:no-underline [&>p_a]:border-b [&>p_a]:border-lime/30 [&>p_a]:pb-[1px] [&>p_a:hover]:border-lime [&>h2]:text-[24px] [&>h2]:font-bold [&>h2]:tracking-tight [&>h2]:mt-10 [&>h2]:mb-4 [&>h2]:text-white [&>h3]:text-[18px] [&>h3]:font-semibold [&>h3]:tracking-tight [&>h3]:mt-8 [&>h3]:mb-3 [&>h3]:text-white [&>ul]:list-disc [&>ul]:pl-6 [&>ul]:my-4 [&>ul]:text-gray-5 [&>ol]:list-decimal [&>ol]:pl-6 [&>ol]:my-4 [&>ol]:text-gray-5 [&>li]:mb-2 [&>pre]:bg-gray-1 [&>pre]:border [&>pre]:border-gray-3 [&>pre]:rounded-lg [&>pre]:p-5 [&>pre]:my-6 [&>pre]:overflow-x-auto [&>code]:font-mono [&>code]:text-[13px] [&>code]:bg-white/5 [&>code]:px-1.5 [&>code]:py-0.5 [&>code]:rounded [&>pre_code]:bg-transparent [&>pre_code]:p-0 [&>pre_code]:text-[12.8px]">
        {{ content }}
    </div>
</article>
